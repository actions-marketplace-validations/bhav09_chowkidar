apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chowkidar-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chowkidar-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chowkidar-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: chowkidar-sa
    namespace: default
roleRef:
  kind: Role
  name: chowkidar-role
  apiGroup: rbac.authorization.k8s.io
